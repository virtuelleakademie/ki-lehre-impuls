project:
  type: website
  resources:
    - assets/*
    - assets/images/*
    - assets/pdfs/*
    - _extensions/quarto-ext/fontawesome/assets/css/all.css
    - _extensions/quarto-ext/fontawesome/assets/webfonts/*
  preview:
    port: 8804
    browser: false
  output-dir: docs
  render:
    - index.qmd
    - slides/*.qmd

website:
  title: "KI in der Lehre: Impuls"
  site-url: https://virtuelleakademie.github.io/ki-lehre-impuls/
  favicon: /assets/robot.png
  open-graph: true
  search:
    location: navbar
    type: overlay

  reader-mode: false
  page-navigation: true
  back-to-top-navigation: true

  navbar:
    background: light
    right:
      - icon: file-earmark-text
        text: "BFH Dokumente"
        menu:
          - text: "KI Policy der BFH"
            href: https://www.bfh.ch/dam/jcr:3b64bdc7-c5d6-4c62-8dc5-0e6a60901c70/KI-Policy_BFH_FHL7Mai25_verabschiedet-1.pdf
            target: _blank
          - text: "Abgeklärte KI-Tools (Intranet)"
            href: https://bernerfachhochschule.sharepoint.com/sites/mybfh-Informationssicherheit-Datenschutz-de/SitePages/Abgekl%C3%A4rte-KI-Tools.aspx
            target: _blank
          - text: "Datenklassifikation (Intranet)"
            href: https://bernerfachhochschule.sharepoint.com/sites/mybfh-Informationssicherheit-Datenschutz-de/SitePages/Datenklassifikation.aspx
            target: _blank
          - text: "Begleitdokument: KI Weiterbildung"
            href: assets/pdfs/Begleitdokument.pdf
            target: _blank
          - text: "Orientierungshilfe"
            href: assets/pdfs/Orientierungshilfe.pdf
            target: _blank
    tools:
      - icon: mortarboard-fill
        text: "BFH Weiterbildung: KI in der Lehre"
        href: https://virtuelleakademie.github.io/de/teaching/bfh-weiterbildung/
        target: _blank
      - icon: lightbulb-fill
        text: Knowledge Base
        href: https://virtuelleakademie.ch/knowledge-base/
        target: _blank

page-footer:
    right:
    - icon: github
      href: https://github.com/virtuelleakademie/ki-lehre-impuls/

lang: de

format:
  html:
    theme:
      - simplex
      - styles/custom.scss
    css:
      - styles/styles.css
      - _extensions/quarto-ext/fontawesome/assets/css/all.css
    include-after-body: scripts/copy-prompt.js
    code-copy: true
    toc: true
    link-external-icon: true
    link-external-newwindow: true
    anchor-sections: true
    smooth-scroll: true
    linkcolor: "#1A1714"

comments:
  hypothesis:
    theme: clean

execute:
  cache: true
  freeze: auto
  execute-dir: project

editor:
  render-on-save: true

filters:
  - timer
  - custom-callout

custom-callout:
  # Activity types - what participants DO (Terracotta)
  experiment:
    title: "Deine Aufgabe"
    icon-symbol: "fa-flask"
    appearance: default
    collapse: false
    color: "#A63D2F"  # Deep Terracotta (action)

  individual:
    title: "Einzelarbeit"
    icon-symbol: "fa-user"
    appearance: default
    color: "#A63D2F"  # Deep Terracotta (action)
    collapse: false

  group:
    title: "Gruppenarbeit"
    icon-symbol: "fa-users"
    appearance: default
    color: "#A63D2F"  # Deep Terracotta (action)
    collapse: false

  demonstration:
    title: "Demonstration"
    icon-symbol: "fa-chalkboard"
    appearance: default
    collapse: false
    color: "#6E6560"  # Warm grey (instructor-led, neutral)

  # Thinking types - reflection and insights (Navy)
  scenario:
    title: "Szenario"
    icon-symbol: "fa-comment"
    appearance: default
    color: "#6E6560"  # Warm grey (neutral context)
    collapse: false

  reflect:
    title: "Reflexion"
    icon-symbol: "fa-lightbulb"
    appearance: default
    color: "#1E3A5F"  # Ink Navy (insight)
    collapse: false

  key-point:
    title: "Kernaussage"
    icon-symbol: "fa-star"
    appearance: default
    collapse: false
    color: "#1E3A5F"  # Ink Navy (importance)

  # Alert type
  warning:
    title: "Achtung"
    icon-symbol: "fa-exclamation-circle"
    appearance: default
    color: "#A63D2F"  # Deep Terracotta (attention)
    collapse: false

  # Guidance types (Navy)
  pro-tip:
    title: "Tipp"
    icon-symbol: "fa-wand-magic-sparkles"
    appearance: default
    color: "#1E3A5F"  # Ink Navy (helpful)
    collapse: true

  source-check:
    title: "Quellen-Check"
    icon-symbol: "fa-search"
    appearance: default
    color: "#1E3A5F"  # Ink Navy (verification)
    collapse: false

  # Technical - copyable prompt for chatbot input
  prompt:
    title: "Prompt"
    icon-symbol: "fa-clipboard"
    appearance: default
    color: "#6E6560"  # Warm grey (code-like)
    collapse: false
